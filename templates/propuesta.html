<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Una Pregunta Especial ✨</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Great+Vibes&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <div class="lanterns-container" id="lanterns"></div>

  <main class="card proposal-box">
    
    <div id="questionBox">
      <div class="sun-icon">
        <svg viewBox="0 0 100 100" class="sun-svg">
          <circle cx="50" cy="50" r="20" fill="gold" />
          <g stroke="gold" stroke-width="3" stroke-linecap="round">
            <line x1="50" y1="15" x2="50" y2="5" />
            <line x1="50" y1="85" x2="50" y2="95" />
            <line x1="15" y1="50" x2="5" y2="50" />
            <line x1="85" y1="50" x2="95" y2="50" />
            <line x1="25" y1="25" x2="18" y2="18" />
            <line x1="75" y1="75" x2="82" y2="82" />
            <line x1="25" y1="75" x2="18" y2="82" />
            <line x1="75" y1="25" x2="82" y2="18" />
          </g>
        </svg>
      </div>

      <h1 class="title">¿Quieres ser mi novia?</h1>
      <p class="subtitle">Prometo hacer cada día mágico... 👑✨</p>

      <div class="divider"></div>

      <div class="buttons-group" id="buttonsGroup">
        <button class="btn-yes" onclick="celebrate()">¡SÍ! 💖</button>
        <button class="btn-no" id="noBtn" onmouseover="moveNoButton()" onclick="moveNoButton()" ontouchstart="moveNoButton()">No 😜</button>
      </div>
    </div>

    <div id="celebrationBox" class="celebration">
      <h2>¡Sabía que dirías que sí! 🎉✨</h2>
      <p>
        ¡Gracias por hacerme el hombre más feliz! <br>
        Prepárate para vivir el mejor cuento de todos juntos. ❤️👑
      </p>
    </div>

  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
